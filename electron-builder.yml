appId: com.user.token-consumption
productName: Token Consumption
directories:
  output: release
  buildResources: build
files:
  - "out/**/*"
  - "package.json"
  - "!**/.vscode/*"
  - "!{tsconfig.json,tsconfig.node.json,electron.vite.config.ts}"
asar: true

win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64

linux:
  target:
    - target: AppImage
      arch:
        - x64
