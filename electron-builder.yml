appId: com.user.token-consumption
productName: Token Consumption
directories:
  output: release
  buildResources: build
files:
  - "out/**/*"
  - "package.json"
  - "!**/.vscode/*"
  - "!{tsconfig.json,tsconfig.node.json,electron.vite.config.ts}"
asar: true

win:
  target:
    - target: portable
      arch:
        - x64

mac:
  target:
    - target: zip
      arch:
        - x64
        - arm64

linux:
  target:
    - target: dir
      arch:
        - x64
