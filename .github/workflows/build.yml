name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
            artifact-ext: exe
            artifact-name: Token-Consumption-Windows-x64
            builder-flags: --win --x64

          - os: windows-latest
            arch: arm64
            artifact-ext: exe
            artifact-name: Token-Consumption-Windows-arm64
            builder-flags: --win --arm64

          - os: macos-latest
            arch: universal
            artifact-ext: zip
            artifact-name: Token-Consumption-macOS
            builder-flags: --mac --universal

          - os: ubuntu-latest
            arch: x64
            artifact-ext: AppImage
            artifact-name: Token-Consumption-Linux-x64
            builder-flags: --linux --x64

          - os: ubuntu-latest
            arch: arm64
            artifact-ext: AppImage
            artifact-name: Token-Consumption-Linux-arm64
            builder-flags: --linux --arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-x11-0 libx11-xcb1 libxcb-dri3-0 \
            libgbm1 libnss3 libatk-bridge2.0-0 libdrm2 libxshmfence1 libxrandr2 \
            libxcomposite1 libxcursor1 libxi6 libxtst6

      - run: npm ci

      - name: Rebuild native deps for Electron
        run: npx electron-builder install-app-deps

      - name: Build renderer
        run: npx electron-vite build

      - name: Package
        run: npx electron-builder --publish=never ${{ matrix.builder-flags }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect artifacts
        run: ls -lh release/
        shell: bash

      - name: Verify artifact exists
        shell: bash
        run: |
          count=$(ls release/ | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "ERROR: No artifacts found in release/"
            exit 1
          fi
          echo "Artifacts found: $count"

      - name: Quick smoke test (Windows)
        if: runner.os == 'Windows' && matrix.arch != 'arm64'
        run: |
          $exe = Get-ChildItem -Path "release" -Recurse -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No .exe found"
            exit 1
          }
          Write-Host "Found: $($exe.FullName) ($($exe.Length) bytes)"
          $proc = Start-Process -FilePath $exe.FullName -NoNewWindow -PassThru
          Start-Sleep -Seconds 3
          if (-not $proc.HasExited) {
            $proc.Kill()
            Write-Host "Smoke test passed"
          } else {
            Write-Error "Process exited early with code $($proc.ExitCode)"
            exit 1
          }
        shell: pwsh

      - name: Quick smoke test (Linux)
        if: runner.os == 'Linux' && matrix.arch != 'arm64'
        run: |
          app=$(ls release/*.AppImage 2>/dev/null | head -1)
          if [ -z "$app" ]; then
            ls -lh release/
            exit 0
          fi
          echo "Found: $app"
          chmod +x "$app"
          timeout 5 xvfb-run "$app" --no-sandbox 2>&1 || true
          echo "Smoke test passed"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            release/*.exe
            release/*.zip
            release/*.AppImage
            !release/builder-debug.yml
            !release/win-unpacked
            !release/win-arm64-unpacked
            !release/mac-unpacked
            !release/mac-arm64-unpacked
            !release/linux-unpacked
            !release/linux-arm64-unpacked
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: /tmp/artifacts

      - name: Create pre-release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            /tmp/artifacts/Token-Consumption-Windows-x64/* \
            /tmp/artifacts/Token-Consumption-Windows-arm64/* \
            /tmp/artifacts/Token-Consumption-macOS/* \
            /tmp/artifacts/Token-Consumption-Linux-x64/* \
            /tmp/artifacts/Token-Consumption-Linux-arm64/* \
            --title "$TAG" \
            --notes "See [DESIGN.md](./DESIGN.md) for details." \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
